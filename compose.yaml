services:
  discord-summary-bot:
    image: python:3.11-slim
    container_name: discord_summary_bot
    restart: unless-stopped
    volumes:
      - /projects/discord-summary:/app
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f python || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "apt-get update && apt-get install -y curl procps && 
             rm -f bot.py && sleep 1 && 
             curl -H 'Cache-Control: no-cache, no-store' -sSL https://raw.githubusercontent.com/Deages/discord-summary/main/bot.py?nocache=$(date +%s) -o bot.py && 
             pip install discord.py google-generativeai youtube-transcript-api && 
             python bot.py"
networks: {}

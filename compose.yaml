services:
  discord-summary-bot:
    image: python:3.11-slim
    container_name: discord_summary_bot
    restart: unless-stopped
    volumes:
      - /projects/discord-summary:/app
    working_dir: /app
    environment:
      - TZ=Australia/Sydney
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -f python || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "apt-get update && apt-get install -y curl procps && 
             python -m pip install --upgrade pip && 
             pip install --no-cache-dir discord.py google-genai youtube-transcript-api && 
             while true; do 
               echo 'Fetching code...';
               curl -sSL 'https://raw.githubusercontent.com/Deages/discord-summary/main/bot.py' -o bot.py.tmp && 
               mv -f bot.py.tmp bot.py && 
               sync && 
               python -u bot.py; 
               echo 'Restarting loop in 5s...';
               sleep 5; 
             done"
networks: {}
